services:
  app:
    build: .
    image: stake-affiliate-api
    restart: unless-stopped
    ports:
      - "${APP_HTTP_PORT:-80}:80"
      - "${APP_HTTPS_PORT:-443}:443"
    env_file:
      - .env
    volumes:
      - app-storage:/app/storage
      - caddy-data:/data
      - caddy-config:/config

volumes:
  app-storage:
  caddy-data:
  caddy-config:
